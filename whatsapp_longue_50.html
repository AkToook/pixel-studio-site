<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Studio — WA Longue (50)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f13; color: #e2e8f0; min-height: 100vh; }

  .header { background: #1a1a2e; padding: 20px 24px; border-bottom: 1px solid #2d2d4e; position: sticky; top: 0; z-index: 50; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 700; }
  .logo span { color: #25d366; }
  .version-badge { background: rgba(37,211,102,0.15); color: #25d366; border: 1px solid rgba(37,211,102,0.3); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .counter { font-size: 14px; color: #64748b; margin-top: 10px; }
  .counter strong { color: #25d366; font-size: 22px; }
  .progress-bar { height: 6px; background: #2d2d4e; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #25d366, #128c7e); border-radius: 3px; transition: width 0.4s ease; }

  .list { padding: 16px; display: flex; flex-direction: column; gap: 10px; max-width: 680px; margin: 0 auto; }

  .card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s; }
  .card.sent { border-color: rgba(37,211,102,0.4); background: rgba(37,211,102,0.04); }
  .card.sent .card-num { color: #25d366; }

  .card-num { font-size: 13px; font-weight: 700; color: #4b5563; min-width: 28px; text-align: center; }

  .card-info { flex: 1; min-width: 0; }
  .card-nom { font-size: 15px; font-weight: 700; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card.sent .card-nom { color: #25d366; text-decoration: line-through; opacity: 0.7; }
  .card-meta { font-size: 12px; color: #64748b; margin-top: 3px; }
  .card-note { font-size: 12px; color: #fbbf24; margin-top: 2px; }

  .card-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn-wa { display: flex; align-items: center; gap: 6px; background: #25d366; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
  .btn-wa:hover { background: #1ebe5d; transform: scale(1.02); }
  .btn-wa:active { transform: scale(0.98); }
  .btn-wa svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
  .card.sent .btn-wa { background: #2d2d4e; color: #4b5563; cursor: default; }
  .card.sent .btn-wa:hover { background: #2d2d4e; transform: none; }

  .btn-check { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid #2d2d4e; background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .btn-check:hover { border-color: #25d366; }
  .card.sent .btn-check { border-color: #25d366; background: rgba(37,211,102,0.15); }

  .sent-label { font-size: 11px; color: #25d366; font-weight: 600; display: none; }
  .card.sent .sent-label { display: block; }

  .reset-btn { display: block; margin: 20px auto; padding: 8px 20px; border: 1px solid #4b5563; background: transparent; color: #4b5563; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

  @media (max-width: 520px) {
    .card { flex-wrap: wrap; }
    .card-actions { width: 100%; justify-content: flex-end; }
    .btn-wa { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

<div class="header">

  <div class="counter">Envoyés : <strong id="sentCount">0</strong> / 50</div>

const MSG_LONG = (nom, type, note, avis) => {
  const noteStr = (note && note !== '—') ? `J'ai vu votre fiche : ${note} sur ${avis} avis. Vous êtes clairement parmi les meilleurs de votre secteur dans la région. C'est exactement le profil qu'on a sélectionné — on a une réputation à tenir, on préfère ne pas prendre beaucoup de monde, on a même refusé des profils sans potentiel.` : `On a regardé votre activité à Reims et vous faites partie des profils qu'on a sélectionnés — on a une réputation à tenir, on préfère travailler avec des pros sérieux.`;
  return `Bonjour, c'est Reda de Pixel Studio, agence web à Paris.

Quand quelqu'un tape « ${type} Reims » sur Google, vous n'apparaissez pas. Vos concurrents raflent des clients qui auraient dû aller chez vous — pas parce qu'ils sont meilleurs, mais parce qu'ils se vendent mieux en ligne.

On a été l'une des meilleures agences sur Paris, notamment dans le travail avec les professionnels indépendants et les petites entreprises. On s'implante maintenant à Reims (j'y habite donc c'est bien plus simple haha) et pour nos débuts ici, on a fait le tour des pros locaux pour choisir avec qui travailler.

${noteStr}

Notre boulot : vous créer un site bien fait — designers et ingénieurs, tout en interne — optimisé pour le référencement local. Résultat : quand quelqu'un tape « ${type} Reims », vous remontez en haut de Google et vous récupérez des clients que vous perdez aujourd'hui.

Nos prix ne sont pas ceux des agences à 10 000–12 000€ — on a pu le voir, on est basés à Paris et on propose des tarifs très corrects. Paiements en plusieurs fois si besoin, garantie satisfait ou remboursé.

Pour notre lancement à Reims, on vous envoie une maquette gratuite de votre futur site — il reste 7 places sur 15. On a juste besoin d'un rapide appel pour quelques infos. 5 min, pas plus.

Ça vous dit ?`;
};

function toWAPhone(tel) {
  return '33' + tel.replace(/\s/g,'').slice(1);
}

function waLink(tel, msg) {
  return `https://wa.me/${toWAPhone(tel)}?text=${encodeURIComponent(msg)}`;
}

let sent = {};
try { sent = JSON.parse(localStorage.getItem('wa_longue') || '{}'); } catch(e) {}

function saveSent() { localStorage.setItem('wa_longue', JSON.stringify(sent)); }

function toggle(id) {
  sent[id] = !sent[id];
  saveSent();
  render();
}

function updateCounter() {
  const n = Object.values(sent).filter(Boolean).length;
  document.getElementById('sentCount').textContent = n;
  document.getElementById('progressFill').style.width = (n/50*100) + '%';
}

function render() {
  updateCounter();
  document.getElementById('list').innerHTML = PROSPECTS.map(p => {
    const kw = KEYWORDS[p.type] || p.type.toLowerCase();
    const msg = MSG_LONG(p.nom, kw, p.note, p.avis);
    const link = waLink(p.tel, msg);
    const isSent = !!sent[p.id];
    return `<div class="card${isSent?' sent':''}" id="card${p.id}">
      <div class="card-num">${p.id}</div>
      <div class="card-info">
        <div class="card-nom">${p.nom}</div>
        <div class="card-meta">${p.type} • ${p.ville} • ${p.tel}</div>
        ${p.note !== '—' ? `<div class="card-note">⭐ ${p.note} (${p.avis} avis)</div>` : ''}
        <div class="sent-label">✓ Envoyé</div>
      </div>
      <div class="card-actions">
        <a class="btn-wa" href="${isSent ? '#' : link}" target="${isSent ? '_self' : '_blank'}" onclick="${isSent ? `event.preventDefault()` : `toggle(${p.id})`}">

function resetAll() {
  if (!confirm('Réinitialiser toute la progression ?')) return;
  sent = {};
  saveSent();
  render();
}
