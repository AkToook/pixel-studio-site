  .stat-value { font-size: 24px; font-weight: 700; color: #818cf8; }
  .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  .stat.orange .stat-value { color: #fb923c; }
  .stat.red .stat-value { color: #f87171; }
  .stat.yellow .stat-value { color: #fbbf24; }

  /* FILTERS */
  .filters { background: #16213e; padding: 14px 32px; border-bottom: 1px solid #2d2d4e; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; gap: 6px; align-items: center; }
  .filter-label { font-size: 12px; color: #64748b; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #2d2d4e; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #818cf8; color: #818cf8; }
  .filter-btn.active { background: #818cf8; border-color: #818cf8; color: #fff; font-weight: 600; }
  .search-input { padding: 6px 12px; border-radius: 8px; border: 1px solid #2d2d4e; background: #0f0f13; color: #e2e8f0; font-size: 13px; width: 200px; outline: none; }
  .search-input:focus { border-color: #818cf8; }
  .filter-sep { width: 1px; height: 24px; background: #2d2d4e; }

  /* TABLE */

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; border-bottom: 1px solid #2d2d4e; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: #818cf8; }
  tbody tr { border-bottom: 1px solid #1e1e30; transition: background 0.1s; }
  tbody tr:hover { background: rgba(129,140,248,0.04); }
  tbody td { padding: 10px 12px; vertical-align: middle; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-fort { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
  .badge-moyen { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .badge-faible { background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
  .badge-inconnu { background: rgba(71,85,105,0.2); color: #64748b; border: 1px solid rgba(71,85,105,0.2); }

  .s-beauté { background: rgba(244,114,182,0.15); color: #f472b6; }
  .s-commerce { background: rgba(234,179,8,0.15); color: #eab308; }

  .s-sport { background: rgba(34,197,94,0.15); color: #22c55e; }

  .status-select.s-envoyer { border-color: #4b5563; color: #9ca3af; }
  .status-select.s-envoye { border-color: #818cf8; color: #818cf8; background: rgba(129,140,248,0.08); }

  .status-select.s-rdv { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.08); }

  .status-select.s-nopas { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }

  .date-input:focus { border-color: #818cf8; color: #e2e8f0; }

// STATE
let state = {};
let filters = { secteur: 'Tous', potentiel: 'Tous', statut: 'Tous' };

const STATUS_J0 = ['À envoyer','Envoyé','Vu','Répondu','Pas intéressé'];
const STATUS_J3 = ['En attente','Envoyé','Vu','Intéressé','RDV fixé','Client','Pas intéressé'];
const REPONSE = ['Aucune','Intéressé','RDV fixé','Client','Pas intéressé','Ne répond pas'];
const COMPTES = ['—','Pro','Perso'];

function loadState() {
  try {
    const saved = localStorage.getItem('pixelstudio_tracker');
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  PROSPECTS.forEach(p => {
    if (!state[p.id]) state[p.id] = { compte:'—', statutJ0:'À envoyer', dateJ0:'', statutJ3:'En attente', reponse:'Aucune', notes:'' };
  });
}

function saveState() {
  localStorage.setItem('pixelstudio_tracker', JSON.stringify(state));
  const ind = document.getElementById('savedIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1500);
}

function update(id, field, val) {
  state[id][field] = val;
  saveState();
  updateStats();
  styleSelect(id, field, val);
}

function styleSelect(id, field, val) {
  const el = document.getElementById(`${field}_${id}`);
  if (!el) return;
  el.className = el.className.split(' ').filter(c => !c.startsWith('s-')).join(' ');
  const map = {
    'À envoyer':'s-envoyer','Envoyé':'s-envoye','Vu':'s-envoye','Répondu':'s-repondu',
    'Intéressé':'s-interesse','RDV fixé':'s-rdv','Client':'s-client','Pas intéressé':'s-nopas',
    'En attente':'s-attente','Ne répond pas':'s-nopas'
  };
  if (map[val]) el.classList.add(map[val]);
  if (field === 'compte') {
    el.className = 'compte-select';
    if (val === 'Pro') el.classList.add('pro');
    if (val === 'Perso') el.classList.add('perso');
  }
}

function updateStats() {
  const total = PROSPECTS.length;
  const envoye = Object.values(state).filter(s => s.statutJ0 !== 'À envoyer').length;
  const repondu = Object.values(state).filter(s => ['Répondu','Intéressé','RDV fixé','Client'].includes(s.reponse)).length;
  const rdv = Object.values(state).filter(s => s.reponse === 'RDV fixé' || s.statutJ3 === 'RDV fixé').length;
  const client = Object.values(state).filter(s => s.reponse === 'Client' || s.statutJ3 === 'Client').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-value">${total}</div>
      <div class="stat-label">Total prospects</div>
    </div>
    <div class="stat green">
      <div class="stat-value">${envoye}</div>
      <div class="stat-label">J0 envoyés</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(envoye/total*100).toFixed(0)}%"></div></div>
    </div>
    <div class="stat yellow">
      <div class="stat-value">${repondu}</div>
      <div class="stat-label">Réponses positives</div>
    </div>
    <div class="stat orange">
      <div class="stat-value">${rdv}</div>
      <div class="stat-label">RDV fixés</div>
    </div>
    <div class="stat" style="">
      <div class="stat-value" style="color:#10b981">${client}</div>
      <div class="stat-label">Clients signés</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:#64748b">${total - envoye}</div>
      <div class="stat-label">Restants à envoyer</div>
    </div>
  `;
}

function setFilter(type, val) {
  filters[type] = val;
  document.querySelectorAll(`.filter-btn`).forEach(btn => {
    if (btn.getAttribute('onclick') === `setFilter('${type}','${val}')`) btn.classList.add('active');
    else if (btn.getAttribute('onclick').startsWith(`setFilter('${type}'`)) btn.classList.remove('active');
  });
  renderTable();
}

function getSecteurClass(s) {
  const map = { 'Artisans':'s-artisans','Beauté':'s-beauté','Commerce local':'s-commerce','Hôtellerie':'s-hôtellerie','Restauration':'s-restauration','Sport & Santé':'s-sport' };
  return map[s] || '';
}

function getPotentielClass(p) {
  const map = { 'Fort':'badge-fort','Moyen':'badge-moyen','Faible':'badge-faible','Inconnu':'badge-inconnu' };
  return map[p] || 'badge-inconnu';
}

function makeSelect(id, field, options, val, cls) {
  return `<select class="${cls}" id="${field}_${id}" onchange="update(${id},'${field}',this.value)">${options.map(o => `<option${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = PROSPECTS.filter(p => {
    if (filters.secteur !== 'Tous' && p.secteur !== filters.secteur) return false;
    if (filters.potentiel !== 'Tous' && p.potentiel !== filters.potentiel) return false;
    if (filters.statut !== 'Tous') {
      const s = state[p.id];
      if (filters.statut === 'À envoyer' && s.statutJ0 !== 'À envoyer') return false;
      if (filters.statut === 'Envoyé' && !['Envoyé','Vu'].includes(s.statutJ0)) return false;
      if (filters.statut === 'Répondu' && !['Répondu'].includes(s.statutJ0)) return false;
    }
    if (search && !p.nom.toLowerCase().includes(search) && !p.type.toLowerCase().includes(search) && !p.ville.toLowerCase().includes(search)) return false;
    return true;
  });

  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');

  if (filtered.length === 0) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const s = state[p.id];
    const statutJ0Select = makeSelect(p.id, 'statutJ0', STATUS_J0, s.statutJ0, 'status-select');
    const statutJ3Select = makeSelect(p.id, 'statutJ3', STATUS_J3, s.statutJ3, 'status-select');
    const reponseSelect = makeSelect(p.id, 'reponse', REPONSE, s.reponse, 'status-select');
    const compteSelect = makeSelect(p.id, 'compte', COMPTES, s.compte, 'compte-select');
    return `<tr>
      <td style="color:#4b5563;font-weight:600;font-size:12px">${p.id}</td>
      <td>
        <div class="nom-cell">${p.nom}</div>
        <div class="type-cell">${p.type}</div>
      </td>
      <td><span class="secteur ${getSecteurClass(p.secteur)}">${p.secteur}</span></td>
      <td style="color:#94a3b8;font-size:12px">${p.ville}</td>
      <td><span class="tel-cell">${p.tel}</span></td>
      <td class="note-cell">${p.note} <span style="color:#4b5563">(${p.avis > 0 ? p.avis+' avis' : '—'})</span></td>
      <td><span class="badge ${getPotentielClass(p.potentiel)}">${p.potentiel}</span></td>
      <td>${compteSelect}</td>
      <td>${statutJ0Select}</td>
      <td><input class="date-input" type="date" id="dateJ0_${p.id}" value="${s.dateJ0}" onchange="update(${p.id},'dateJ0',this.value)"></td>
      <td>${statutJ3Select}</td>
      <td>${reponseSelect}</td>
      <td><input class="notes-input" type="text" id="notes_${p.id}" value="${s.notes}" placeholder="Notes..." onchange="update(${p.id},'notes',this.value)"></td>
    </tr>`;
  }).join('');

  // Apply styles after render
  filtered.forEach(p => {
    const s = state[p.id];
    styleSelect(p.id, 'statutJ0', s.statutJ0);
    styleSelect(p.id, 'statutJ3', s.statutJ3);
    styleSelect(p.id, 'reponse', s.reponse);
    styleSelect(p.id, 'compte', s.compte);
  });
}

function exportCSV() {
  const headers = ['#','Nom','Type','Secteur','Ville','Téléphone','Note','Avis','Potentiel','Compte','Statut J0','Date J0','Statut J+3','Réponse','Notes'];
  const rows = PROSPECTS.map(p => {
    const s = state[p.id];
    return [p.id, `"${p.nom}"`, `"${p.type}"`, p.secteur, p.ville, p.tel, p.note, p.avis, p.potentiel, s.compte, s.statutJ0, s.dateJ0, s.statutJ3, s.reponse, `"${s.notes}"`].join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);
  a.download = 'prospects_reims_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function resetAll() {
  if (!confirm('Réinitialiser toute la progression ? Cette action est irréversible.')) return;
  localStorage.removeItem('pixelstudio_tracker');
  state = {};
  loadState();
  renderTable();
  updateStats();
}

// INIT
loadState();
updateStats();
renderTable();
</script>
